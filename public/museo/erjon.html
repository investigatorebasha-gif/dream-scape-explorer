<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erjon — Crediti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #1a1f2e 0%, #0a0d14 100%);
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }
    .quote {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 600;
      line-height: 1.4;
      max-width: 800px;
      background: linear-gradient(135deg, #d4af37, #f5d97c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 3rem;
    }
    .percent {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #d4af37, #f5d97c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    a.back {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
    }
    a.back:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <h1>Erjon</h1>
  <div class="percent">98%</div>
  <p class="quote">Erjon ha svolto il 98% del lavoro</p>
  <a href="index.html" class="back">← Torna al museo</a>
</body>
</html>
